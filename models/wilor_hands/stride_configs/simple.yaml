backend: simple

runtime:
  use_gpu: true
  visualize: false
  mano_model_path: ./mano_data

refinement:
  iters: 300
  lr: 0.05
  weights:
    obs: 10.0
    reproj: 2.0
    shape: 5.0
    cam_smooth: 25.0
    pose_smooth: 1.5
    joint_smooth: 0.5
    anchor: 0.5
    fft: 0.0
  fft_band_low_hz:
  fft_band_high_hz:
  fps: 30.0
  pose_rank: 32
  cam_rank: 16
