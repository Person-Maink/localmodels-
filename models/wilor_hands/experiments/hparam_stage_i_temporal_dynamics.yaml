defaults:
  # Stage I: tune temporal continuity assumptions and residual reduction.
  train_mode: distill
  train_scope: refine_net
  videos:
    - 0KuJ2t4S_TY
    - 0gzQAgjx39o
    - 0rq4nkWlO2E
    - 0ElPjqY4Cq8
    - SlksdQT5JRE
  validation_split: 0.2
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 500
  log_every: 25
  save_every: 100
  seed: 42
  optimizer:
    lr: 1.0e-5
    weight_decay: 1.0e-4
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.005
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001

experiments:
  - name: hp_i_gap1_smoothl1
    run_name_suffix: hp_i_gap1_smoothl1

  - name: hp_i_gap2_smoothl1
    run_name_suffix: hp_i_gap2_smoothl1
    temporal:
      max_frame_gap: 2

  - name: hp_i_gap3_smoothl1
    run_name_suffix: hp_i_gap3_smoothl1
    temporal:
      max_frame_gap: 3

  - name: hp_i_gap1_l1
    run_name_suffix: hp_i_gap1_l1
    temporal:
      reduction: l1

  - name: hp_i_gap1_l2
    run_name_suffix: hp_i_gap1_l2
    temporal:
      reduction: l2
