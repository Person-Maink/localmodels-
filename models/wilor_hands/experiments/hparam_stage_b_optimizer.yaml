defaults:
  # Stage B: tune optimizer settings after Stage A picks a good window setup.
  # These defaults use a conservative starter config; replace them with the
  # winning Stage A setup before launching if needed.
  train_mode: distill
  train_scope: refine_net
  videos:
    - 5XDn22CL-ig
    - 0gzQAgjx39o
    - -KgBBru7lps
    - koOvrKENdH8
    - SlksdQT5JRE
  validation_split: 0.2
  sample_limit: 256
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 4
  num_workers: 2
  max_steps: 200
  log_every: 10
  save_every: 100
  seed: 42
  optimizer:
    lr: 1.0e-5
    weight_decay: 1.0e-4
  temporal:
    window_size: 5
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.01
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.01
      scorer_weight: 0.001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.01
      scorer_weight: 0.001
    temporal_bbox_input:
      enabled: true
      formulation: learnable
      weight: 0.01
      scorer_weight: 0.001

experiments:
  - name: hp_b_lr_3e6
    run_name_suffix: hp_b_lr_3e6
    optimizer:
      lr: 3.0e-6

  - name: hp_b_lr_1e5
    run_name_suffix: hp_b_lr_1e5
    optimizer:
      lr: 1.0e-5

  - name: hp_b_lr_3e5
    run_name_suffix: hp_b_lr_3e5
    optimizer:
      lr: 3.0e-5
