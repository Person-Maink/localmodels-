defaults:
  # Stage G: compare trainable scopes on the current best-known baseline.
  # The full-model run uses a smaller batch for memory safety.
  train_mode: distill
  train_scope: refine_net
  videos:
    - 0KuJ2t4S_TY
    - 0gzQAgjx39o
    - 0rq4nkWlO2E
    - 0ElPjqY4Cq8
    - SlksdQT5JRE
  validation_split: 0.2
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 500
  log_every: 25
  save_every: 100
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 1.0e-3
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.005
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.01
      scorer_weight: 0.001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.01
      scorer_weight: 0.001
    temporal_vipe_camera:
      enabled: true
      formulation: learnable
      weight: 0.01
      smoothness_weight: 0.005
      anchor_weight: 0.001

experiments:
  - name: hp_g_scope_camera_head
    run_name_suffix: hp_g_scope_camera_head
    train_scope: camera_head

  - name: hp_g_scope_refine_net
    run_name_suffix: hp_g_scope_refine_net
    train_scope: refine_net

  - name: hp_g_scope_full
    run_name_suffix: hp_g_scope_full
    train_scope: full
    batch_size: 4
