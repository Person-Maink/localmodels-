defaults:
  # Stage D: tune the ViPE camera supervision weight after the Stage C winner
  # has locked in the temporal setup and temporal-loss scales.
  # Defaults now match the final best-known setup so only the ViPE weight varies.
  train_mode: distill
  train_scope: refine_net
  videos:
    - 0KuJ2t4S_TY
    - 0gzQAgjx39o
    - 0rq4nkWlO2E
    - 0ElPjqY4Cq8
    - SlksdQT5JRE
  validation_split: 0.2
  sample_limit: 256
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 200
  log_every: 10
  save_every: 100
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 1.0e-4
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.005
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001

experiments:
  - name: hp_d_vipe_0p005
    run_name_suffix: hp_d_vipe_0p005
    losses:
      vipe_camera:
        weight: 0.005

  - name: hp_d_vipe_0p01
    run_name_suffix: hp_d_vipe_0p01
    losses:
      vipe_camera:
        weight: 0.01

  - name: hp_d_vipe_0p02
    run_name_suffix: hp_d_vipe_0p02
    losses:
      vipe_camera:
        weight: 0.02

  - name: hp_d_vipe_0p05
    run_name_suffix: hp_d_vipe_0p05
    losses:
      vipe_camera:
        weight: 0.05
