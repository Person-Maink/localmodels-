defaults:
  # Stage J: tune the temporal ViPE camera head with WiLoR fully frozen.
  # This is the first frozen-suite stage whose learnable branch directly
  # consumes ViPE camera targets through a temporal head.
  train_mode: distill
  train_scope: temporal_only
  videos:
    - 0KuJ2t4S_TY
    - 0gzQAgjx39o
    - 0rq4nkWlO2E
    - 0ElPjqY4Cq8
    - SlksdQT5JRE
  validation_split: 0.2
  sample_limit: 256
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 200
  log_every: 10
  save_every: 100
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 0.0
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: false
      weight: 0.0
    temporal_camera:
      enabled: false
      formulation: learnable
      weight: 0.0
      scorer_weight: 0.0
    temporal_bbox_projected:
      enabled: false
      formulation: learnable
      weight: 0.0
      scorer_weight: 0.0
    temporal_vipe_camera:
      enabled: true
      formulation: learnable
      weight: 0.01
      smoothness_weight: 0.005
      anchor_weight: 0.001

experiments:
  - name: hp_j_tvc_w_5e3
    run_name_suffix: hp_j_tvc_w_5e3
    losses:
      temporal_vipe_camera:
        weight: 0.005

  - name: hp_j_tvc_w_1e2
    run_name_suffix: hp_j_tvc_w_1e2
    losses:
      temporal_vipe_camera:
        weight: 0.01

  - name: hp_j_tvc_w_3e2
    run_name_suffix: hp_j_tvc_w_3e2
    losses:
      temporal_vipe_camera:
        weight: 0.03

  - name: hp_j_tvc_reg_heavier
    run_name_suffix: hp_j_tvc_reg_heavier
    losses:
      temporal_vipe_camera:
        weight: 0.01
        smoothness_weight: 0.01
        anchor_weight: 0.003
