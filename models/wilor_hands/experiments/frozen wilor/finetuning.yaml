defaults:
  # Winner-locked full-dataset finetuning baseline for the frozen-WiLoR suite.
  # Keep this file aligned with the latest checked-in stage winners only.
  # Do not add smoke tests or ad hoc manual variants here.
  # Future edits should preserve the shared long-run full-dataset schedule
  # across suites unless the comparison protocol itself changes.
  train_mode: distill
  train_scope: temporal_only
  all_videos: true
  validation_split: 0.15
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 10000
  log_every: 25
  save_every: 250
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 0.0
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: false
      weight: 0.0
    temporal_camera:
      enabled: false
      formulation: learnable
      weight: 0.0
      scorer_weight: 0.0001
    temporal_bbox_projected:
      enabled: false
      formulation: learnable
      weight: 0.0
      scorer_weight: 0.0001
    temporal_vipe_camera:
      enabled: true
      formulation: learnable
      weight: 0.01
      scorer_weight: 0.0
      smoothness_weight: 0.005
      anchor_weight: 0.001

experiments:
  - name: frozen_wilor_finetuning
    run_name_suffix: frozen_wilor_finetuning
