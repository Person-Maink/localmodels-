defaults:
  # Stage D: actual tuning pass on the frozen scorer-only baseline after the
  # new scorer-weight sweep locks in the current winner.
  # Keep all non-video settings fixed; only the video set changes here.
  train_mode: distill
  train_scope: temporal_only
  validation_split: 0.2
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 500
  log_every: 25
  save_every: 100
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 1.0e-4
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: false
      weight: 0.0
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.0
      scorer_weight: 0.0001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.0
      scorer_weight: 0.0001

experiments:
  - name: hp_d_tune_all_videos
    run_name_suffix: hp_d_tune_all_videos
    all_videos: true

  - name: hp_d_tune_stage_5_videos
    run_name_suffix: hp_d_tune_stage_5_videos
