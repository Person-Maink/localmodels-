defaults:
  # Stage G: compare additive trainable scopes on the current best-known
  # baseline. Every run here trains the selected WiLoR scope plus LoRA.
  train_mode: distill
  train_scope: refine_net
  videos:
    - 0KuJ2t4S_TY
    - 0gzQAgjx39o
    - 0rq4nkWlO2E
    - 0ElPjqY4Cq8
    - SlksdQT5JRE
  validation_split: 0.2
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 500
  log_every: 25
  save_every: 100
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 0.0
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  lora:
    enabled: true
    rank: 8
    alpha: 16.0
    dropout: 0.0
    block_start: 24
    block_end: 32
    target_modules:
      - qkv
  losses:
    vipe_camera:
      enabled: true
      weight: 0.005
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.1
      scorer_weight: 0.001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.1
      scorer_weight: 0.001

experiments:
  - name: lora_hp_g_scope_temporal_only
    run_name_suffix: lora_hp_g_scope_temporal_only
    train_scope: temporal_only

  - name: lora_hp_g_scope_refine_net
    run_name_suffix: lora_hp_g_scope_refine_net
    train_scope: refine_net
