defaults:
  train_mode: distill
  train_scope: refine_net
  videos:
    - 120-2_clip_1
  validation_split: 0.15
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 4
  max_steps: 10000
  log_every: 1
  save_every: 250
  seed: 42
  optimizer:
    lr: 1.0e-5
    weight_decay: 1.0e-4
  temporal:
    window_size: 8
    window_stride: 4
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.01
    temporal_camera:
      enabled: false
      formulation: static
      weight: 0.0
      scorer_weight: 0.0
    temporal_bbox_projected:
      enabled: false
      formulation: static
      weight: 0.0
      scorer_weight: 0.0
    temporal_bbox_input:
      enabled: false
      formulation: static
      weight: 0.0
      scorer_weight: 0.0

experiments:

  - name: test_temporal_all_losses
    run_name_suffix: test_temp_all
    train_mode: test
    max_steps: 100
    log_every: 1
    save_every: 50
    sample_limit: 64
    batch_size: 2
    num_workers: 1
    temporal:
      window_size: 3
    losses:
      temporal_camera:
        enabled: true
        formulation: learnable
        weight: 0.01
        scorer_weight: 0.001
      temporal_bbox_projected:
        enabled: true
        formulation: learnable
        weight: 0.01
        scorer_weight: 0.001
      temporal_bbox_input:
        enabled: true
        formulation: learnable
        weight: 0.01
        scorer_weight: 0.001
