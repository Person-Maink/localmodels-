defaults:
  # Combined winner-locked full-dataset finetuning launcher for the three
  # comparison regimes: main, frozen WiLoR, and LoRA.
  # Keep the long-run schedule shared across all experiments in this file and
  # only override regime-specific winner settings inside each experiment.
  # Future edits should preserve this 3-regime comparison structure unless the
  # evaluation protocol itself changes.
  train_mode: distill
  train_scope: refine_net
  all_videos: true
  validation_split: 0.15
  sample_limit: 0
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 8
  num_workers: 2
  max_steps: 10000
  log_every: 25
  save_every: 250
  seed: 42
  optimizer:
    lr: 3.0e-5
    weight_decay: 1.0e-3
  temporal:
    window_size: 3
    window_stride: 2
    max_frame_gap: 1
    reduction: l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.005
    temporal_camera:
      enabled: true
      formulation: static
      weight: 0.01
      scorer_weight: 0.0
    temporal_bbox_projected:
      enabled: true
      formulation: static
      weight: 0.01
      scorer_weight: 0.0
    temporal_vipe_camera:
      enabled: true
      formulation: learnable
      weight: 0.01
      smoothness_weight: 0.005
      anchor_weight: 0.001

experiments:
  - name: main_finetuning
    run_name_suffix: main_finetuning

  - name: frozen_wilor_finetuning
    run_name_suffix: frozen_wilor_finetuning
    train_scope: temporal_only
    optimizer:
      weight_decay: 0.0
    temporal:
      reduction: smooth_l1
    losses:
      vipe_camera:
        enabled: false
        weight: 0.0
      temporal_camera:
        enabled: false
        formulation: learnable
        weight: 0.0
        scorer_weight: 0.0
      temporal_bbox_projected:
        enabled: false
        formulation: learnable
        weight: 0.0
        scorer_weight: 0.0
      temporal_vipe_camera:
        enabled: true
        formulation: learnable
        weight: 0.01
        smoothness_weight: 0.005
        anchor_weight: 0.001

  - name: lora_finetuning
    run_name_suffix: lora_finetuning
    optimizer:
      weight_decay: 1.0e-4
    temporal:
      reduction: smooth_l1
    lora:
      enabled: true
      rank: 8
      alpha: 16.0
      dropout: 0.0
      block_start: 24
      block_end: 32
      target_modules:
        - qkv
    losses:
      vipe_camera:
        enabled: true
        weight: 0.05
      temporal_camera:
        enabled: true
        formulation: learnable
        weight: 0.1
        scorer_weight: 0.001
      temporal_bbox_projected:
        enabled: true
        formulation: learnable
        weight: 0.1
        scorer_weight: 0.001
      temporal_vipe_camera:
        enabled: true
        formulation: learnable
        weight: 0.01
        smoothness_weight: 0.005
        anchor_weight: 0.001
