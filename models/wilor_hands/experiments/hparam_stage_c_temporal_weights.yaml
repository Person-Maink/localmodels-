defaults:
  # Stage C: tune temporal-loss scale after Stage A/B choose a stable config.
  # These defaults use the same conservative starter as Stage B; update them to
  # match the winning earlier-stage setup before launching if needed.
  train_mode: distill
  train_scope: refine_net
  videos:
    - 5XDn22CL-ig
    - 1oztZZLorBI
    - 0k6USIJasZY
    - 4MUq3Prl8pU
    - 7ZeIBdPZhC0
  validation_split: 0.2
  sample_limit: 256
  detection_conf: 0.3
  rescale_factor: 2.0
  batch_size: 4
  num_workers: 2
  max_steps: 200
  log_every: 10
  save_every: 100
  seed: 42
  optimizer:
    lr: 1.0e-5
    weight_decay: 1.0e-4
  temporal:
    window_size: 5
    window_stride: 2
    max_frame_gap: 1
    reduction: smooth_l1
    scorer_hidden_dim: 64
    scorer_layers: 2
    scorer_dropout: 0.0
  losses:
    vipe_camera:
      enabled: true
      weight: 0.01
    temporal_camera:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001
    temporal_bbox_projected:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001
    temporal_bbox_input:
      enabled: true
      formulation: learnable
      weight: 0.03
      scorer_weight: 0.001

experiments:
  - name: hp_c_tw_0p01_sw_0p001
    run_name_suffix: hp_c_tw_0p01_sw_0p001
    losses:
      temporal_camera:
        weight: 0.01
        scorer_weight: 0.001
      temporal_bbox_projected:
        weight: 0.01
        scorer_weight: 0.001
      temporal_bbox_input:
        weight: 0.01
        scorer_weight: 0.001

  - name: hp_c_tw_0p03_sw_0p001
    run_name_suffix: hp_c_tw_0p03_sw_0p001
    losses:
      temporal_camera:
        weight: 0.03
        scorer_weight: 0.001
      temporal_bbox_projected:
        weight: 0.03
        scorer_weight: 0.001
      temporal_bbox_input:
        weight: 0.03
        scorer_weight: 0.001

  - name: hp_c_tw_0p10_sw_0p001
    run_name_suffix: hp_c_tw_0p10_sw_0p001
    losses:
      temporal_camera:
        weight: 0.1
        scorer_weight: 0.001
      temporal_bbox_projected:
        weight: 0.1
        scorer_weight: 0.001
      temporal_bbox_input:
        weight: 0.1
        scorer_weight: 0.001

  - name: hp_c_tw_0p03_sw_0p01
    run_name_suffix: hp_c_tw_0p03_sw_0p01
    losses:
      temporal_camera:
        weight: 0.03
        scorer_weight: 0.01
      temporal_bbox_projected:
        weight: 0.03
        scorer_weight: 0.01
      temporal_bbox_input:
        weight: 0.03
        scorer_weight: 0.01
