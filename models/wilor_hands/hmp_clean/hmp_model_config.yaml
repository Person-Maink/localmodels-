# Minimal upstream HMP runtime config used by STRIDE pose-only refinement.

batch_size: 1
bvh_viz: false

data:
  clip_length: 128
  fps: 30
  gender: neutral
  normalize:
  - pos
  - velocity
  - global_xform
  - angular
  - root_orient
  root_transform: true
  up: z

dataset_dir: _DATA/hmp_model

global_prior:
  activation: tanh
  in_channels: 6
  kernel_size: 4
  temporal_scale: 8
  z_dim: 256

is_train: false
lambda_kl: 0.0001

local_prior:
  activation: tanh
  channel_base: 15
  extra_conv: 0
  kernel_size: 4
  num_layers: 4
  padding_mode: reflect
  skeleton_dist: 2
  skeleton_pool: mean
  temporal_scale: 8
  upsampling: linear
  use_residual_blocks: true
  z_dim: 1024

log: false
multi_gpu: false

nemf:
  bandwidth: 7
  global_output: 6
  global_z: 256
  hidden_neuron: 1024
  local_output: 144
  local_z: 1024
  norm_layer: true
  siren: false
  skip_connection: true

output_trans: false
overlap_len: 16
pretrained_gmp: false
save_dir: _DATA/hmp_model
verbose: false
